task_name: m2d_sc_stage3_estimated_temporal_strong_robust
description: Fine-tune temporal strong M2D-SC on cached USS/TSE estimated
  source waveforms with opt-in soft loss truncation for noisy estimated labels.

deterministic: true
manual_seed: 0

datamodule:
  module: src.datamodules.datamodule
  main: DataModule
  args:
    train_dataloader:
      batch_size: 32
      num_workers: 8
      persistent_workers: false
      dataset:
        module: src.datamodules.source_classifier_dataset
        main: EstimatedSourceClassifierDataset
        args:
          source_prefix: est
          base_dataset:
            args:
              config:
                mode: waveform
                soundscape_dir: workspace/sc_finetune/soundscape
                oracle_target_dir: workspace/sc_finetune/oracle_target
                estimate_target_dir: workspace/sc_finetune/estimate_target
                sr: 32000
              n_sources: 3
              label_set: dcase2026t4
              return_source: true
              label_vector_mode: stack
              silence_label_mode: zeros
              return_meta: false
    val_dataloader:
      batch_size: 32
      num_workers: 8
      persistent_workers: false
      dataset:
        module: src.datamodules.source_classifier_dataset
        main: SourceClassifierDataset
        args:
          base_dataset:
            args:
              config:
                mode: metadata
                metadata_list: data/dev_set/metadata/valid.json
                fg_return:
                  dry: true
                  dry_channel: 0
                  metadata: true
                sr: 32000
              n_sources: 3
              label_set: dcase2026t4
              return_source: true
              label_vector_mode: stack
              silence_label_mode: zeros
              return_meta: false
lightning_module:
  module: src.training.lightningmodule.single_label_classification
  main: SingleLabelClassificationLightning
  args:
    model:
      module: src.models.m2dat.m2d_sc
      main: M2DSingleClassifierTemporalStrong
      args:
        weight_file:
          checkpoint/m2d_as_vit_base-80x1001p16x16p32k-240413_AS-FT_enconly/weights_ep69it3124-0.47998.pth
        num_classes: 18
        embedding_dim: 512
        pooling_hidden_dim: 512
        projection_hidden_dim: 1024
        dropout: 0.2
        finetuning_layers: 2_blocks
        eval_crop_seconds: 5.0
        activity_hidden_dim: 256
        activity_temperature: 1.0
        eval_crop_hop_seconds: 2.5
        energy_thresholds:
          default: -3.5
    loss:
      module: src.training.loss.m2d_sc_arcface
      main: get_loss_func
      args:
        lambda_energy: 0.001
        m_in: -6.0
        m_out: -1.0
        lambda_activity: 0.2
        activity_pos_weight: 2.0
        label_smoothing: 0.05
        robust_loss_mode: truncation
        truncation_quantile: 0.8
        truncation_warmup_epochs: 1
        truncation_drop_weight: 0.1
        min_keep_ratio: 0.5
    optimizer:
      module: torch.optim
      main: AdamW
      args:
        params:
        lr: 0.0002
        betas: [0.9, 0.999]
        eps: 0.00000001
        weight_decay: 0.01
        amsgrad: true
    is_validation: true
train:
  callbacks:
  - name: checkpoint
    module: lightning.pytorch.callbacks
    main: ModelCheckpoint
    args:
      every_n_epochs: 1
      filename: '{epoch}'
      save_top_k: 1
      save_last: true
      monitor: epoch_val/loss
      mode: min
      verbose: false
      dirpath:
  - name: tqdm
    module: lightning.pytorch.callbacks
    main: TQDMProgressBar
    args:
      refresh_rate: 60
      process_position: 0
  trainer:
    module: lightning.pytorch
    main: Trainer
    args:
      accelerator: auto
      devices: auto
      strategy: ddp_find_unused_parameters_true
      num_nodes: 1
      precision: bf16-mixed
      logger:
      fast_dev_run: false
      max_epochs: 30
      log_every_n_steps: 100
      use_distributed_sampler: true
      sync_batchnorm: true
      num_sanity_val_steps: 0
      enable_checkpointing: true
      enable_progress_bar: true
      enable_model_summary: true
      gradient_clip_val: 0.5
