task_name: m2d_sc_stage1_beats_fusion
description: M2D source classifier fused with frozen BEATs AudioSet semantics.

deterministic: true
manual_seed: 0

datamodule:
  module: src.datamodules.datamodule
  main: DataModule
  args:
    train_dataloader:
      batch_size: 24
      num_workers: 8
      persistent_workers: false
      dataset:
        module: src.datamodules.source_classifier_dataset
        main: SourceClassifierDataset
        args:
          base_dataset:
            args:
              config:
                mode: generate
                spatial_sound_scene:
                  duration: 10.0
                  sr: 32000
                  max_event_overlap: 3
                  max_event_dur: 10.0
                  ref_db: -55
                  foreground_dir: data/dev_set/sound_event/train
                  background_dir: data/dev_set/noise/train
                  interference_dir: data/dev_set/interference/train
                  room_config:
                    module: src.modules.spatial_audio_synthesizer.room
                    main: SofaRoom
                    args:
                      path: data/dev_set/room_ir/train
                      direct_range_ms: [6, 50]
                dupse_rate: 0.5
                dupse_min_angle: 60.0
                max_n_dupse: 2
                dupse_exclusion_folder_depth: 1
                snr_range: [5, 20]
                nevent_range: [0, 3]
                ninterference_range: [0, 2]
                inteference_snr_range: [0, 15]
                dataset_length: 25088
                shuffle_label: true
                fg_return: {dry: true, dry_channel: 0, metadata: true}
              n_sources: 3
              label_set: dcase2026t4
              return_source: true
              label_vector_mode: stack
              silence_label_mode: zeros
              return_meta: false
    val_dataloader:
      batch_size: 24
      num_workers: 8
      persistent_workers: false
      dataset:
        module: src.datamodules.source_classifier_dataset
        main: SourceClassifierDataset
        args:
          base_dataset:
            args:
              config:
                mode: metadata
                metadata_list: data/dev_set/metadata/valid.json
                fg_return:
                  dry: true
                  dry_channel: 0
                  metadata: true
                sr: 32000
              n_sources: 3
              label_set: dcase2026t4
              return_source: true
              label_vector_mode: stack
              silence_label_mode: zeros
              return_meta: false
lightning_module:
  module: src.training.lightningmodule.single_label_classification
  main: SingleLabelClassificationLightning
  args:
    model:
      module: src.models.m2dat.m2d_sc
      main: M2DPretrainedFusionClassifier
      args:
        weight_file:
          checkpoint/m2d_as_vit_base-80x1001p16x16p32k-240413_AS-FT_enconly/weights_ep69it3124-0.47998.pth
        num_classes: 18
        embedding_dim: 512
        m2d_embedding_dim: 512
        pooling_hidden_dim: 512
        projection_hidden_dim: 1024
        dropout: 0.2
        finetuning_layers: 2_blocks
        aux_model: beats
        aux_backend: official_beats
        aux_weight:
          checkpoint/beats/BEATs_iter3_plus_AS2M_finetuned_on_AS2M_cpt2.pt
        beats_source_dir: external/BEATs
        aux_embedding_dim: 527
        aux_sample_rate: 16000
        input_sample_rate: 32000
        aux_pooling: mean
        freeze_aux: true
        beats_use_finetuned_logits: true
        fusion_mode: concat_mlp
        fusion_hidden_dim: 1024
    loss:
      module: src.training.loss.m2d_sc_arcface
      main: get_loss_func
      args:
        lambda_energy: 0.0
    optimizer:
      module: torch.optim
      main: AdamW
      args:
        params:
        lr: 0.0003
        betas: [0.9, 0.999]
        eps: 0.00000001
        weight_decay: 0.01
        amsgrad: true
    is_validation: true
train:
  callbacks:
  - name: checkpoint
    module: lightning.pytorch.callbacks
    main: ModelCheckpoint
    args:
      every_n_epochs: 1
      filename: '{epoch}'
      save_top_k: 1
      save_last: true
      monitor: epoch_val/loss
      mode: min
      verbose: false
      dirpath:
  - name: tqdm
    module: lightning.pytorch.callbacks
    main: TQDMProgressBar
    args:
      refresh_rate: 60
      process_position: 0
  trainer:
    module: lightning.pytorch
    main: Trainer
    args:
      accelerator: auto
      devices: auto
      strategy: ddp_find_unused_parameters_true
      num_nodes: 1
      precision: bf16-mixed
      logger:
      fast_dev_run: false
      max_epochs: 100
      log_every_n_steps: 100
      use_distributed_sampler: true
      sync_batchnorm: true
      num_sanity_val_steps: 0
      enable_checkpointing: true
      enable_progress_bar: true
      enable_model_summary: true
      gradient_clip_val: 0.5
