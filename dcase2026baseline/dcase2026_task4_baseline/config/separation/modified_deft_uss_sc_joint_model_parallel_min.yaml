task_name: modified_deft_uss_sc_joint_model_parallel
manual_seed: 0
deterministic: true

datamodule:
  module: src.datamodules.datamodule
  main: DataModule
  args:
    train_dataloader:
      batch_size: 2
      num_workers: 4
      persistent_workers: false
      dataset:
        module: src.datamodules.noisy_label_dataset
        main: QualityAwareUSSDataset
        args:
          source_quality_manifest: workspace/manifests/source_quality_manifest.jsonl
          default_quality_group: clean
          resample_bad_foreground: true
          max_resample_attempts: 8
          uncertain_class_weight: 0.35
          bad_class_weight: 0.0
          base_dataset:
            args:
              config:
                mode: generate
                spatial_sound_scene:
                  duration: 10.0
                  sr: 32000
                  max_event_overlap: 3
                  max_event_dur: 10.0
                  ref_db: -55
                  foreground_dir: data/dev_set/sound_event/train
                  background_dir: data/dev_set/noise/train
                  interference_dir: data/dev_set/interference/train
                  room_config:
                    module: src.modules.spatial_audio_synthesizer.room
                    main: SofaRoom
                    args: {path: data/dev_set/room_ir/train, direct_range_ms: [6, 50]}
                dupse_rate: 0.5
                dupse_min_angle: 60.0
                max_n_dupse: 2
                dupse_exclusion_folder_depth: 1
                snr_range: [5, 20]
                nevent_range: [0, 3]
                ninterference_range: [0, 2]
                inteference_snr_range: [0, 15]
                dataset_length: 10112
                shuffle_label: true
                fg_return: {dry: true, dry_channel: 0, metadata: true}
                int_return: {dry: true, dry_channel: 0, metadata: true}
                bg_return: {waveform: true}
              n_sources: 3
              label_set: dcase2026t4
              return_source: true
              label_vector_mode: stack
              silence_label_mode: zeros
              return_meta: true
    val_dataloader:
      batch_size: 2
      num_workers: 4
      persistent_workers: false
      dataset:
        module: src.datamodules.noisy_label_dataset
        main: QualityAwareUSSDataset
        args:
          source_quality_manifest: workspace/manifests/source_quality_manifest.jsonl
          default_quality_group: clean
          resample_bad_foreground: false
          base_dataset:
            args:
              config:
                mode: metadata
                metadata_list: data/dev_set/metadata/valid.json
                fg_return: {dry: true, dry_channel: 0, metadata: true}
                int_return: {dry: true, dry_channel: 0, metadata: true}
                bg_return: {waveform: true}
                sr: 32000
              n_sources: 3
              label_set: dcase2026t4
              return_source: true
              label_vector_mode: stack
              silence_label_mode: zeros
              return_meta: true

lightning_module:
  module: src.training.lightningmodule.uss_sc_joint_model_parallel
  main: USSCSJointModelParallelLightning
  args:
    uss_device: cuda:0
    sc_device: cuda:1
    freeze_sc: true
    sc_eval_mode_when_frozen: true
    lambda_sc: 0.05
    lambda_consistency: 0.02
    match_metric: sa_sdr
    min_match_score: -10.0
    min_energy_db: -60.0
    detach_waveform_for_sc: false
    uss_pretrained_ckpt: workspace/uss_noisylabel/checkpoints/last.ckpt
    uss_pretrained_strict: false
    sc_pretrained_ckpt: workspace/sc_stage3/checkpoints/last.ckpt
    sc_pretrained_strict: false
    uss_model:
      module: src.models.deft.modified_deft
      main: ModifiedDeFTUSSSpatialTemporal
      args:
        input_channels: 4
        output_channels: 1
        hidden_channels: 96
        n_deft_blocks: 6
        n_heads: 4
        n_foreground: 3
        n_interference: 2
        n_classes: 18
        sample_rate: 32000
    sc_model:
      module: src.models.m2dat.m2d_sc
      main: M2DSingleClassifierTemporalStrong
      args:
        weight_file: checkpoint/m2d_as_vit_base-80x1001p16x16p32k-240413_AS-FT_enconly/weights_ep69it3124-0.47998.pth
        num_classes: 18
        embedding_dim: 512
        pooling_hidden_dim: 512
        projection_hidden_dim: 1024
        dropout: 0.2
        finetuning_layers: 2_blocks
        eval_crop_seconds: 5.0
        activity_hidden_dim: 256
        activity_temperature: 1.0
        eval_crop_hop_seconds: 2.5
        energy_thresholds: {default: -3.5}
    uss_loss:
      module: src.training.loss.uss_noisy_label_loss
      main: get_loss_func
      args:
        lambda_non_foreground: 0.01
        lambda_class_match: 0.25
        lambda_inactive_foreground: 0.05
        lambda_inactive_interference: 0.01
        lambda_inactive_noise: 0.01
        lambda_activity_foreground: 0.1
        lambda_activity_interference: 0.05
        lambda_activity_noise: 0.02
        activity_pos_weight: 2.0
        use_soft_targets: true
        use_class_confidence: true
        robust_semantic_mode: soft_truncated
    sc_loss:
      module: src.training.loss.m2d_sc_arcface
      main: get_loss_func
      args:
        lambda_energy: 0.001
        m_in: -6.0
        m_out: -1.0
        lambda_activity: 0.2
        activity_pos_weight: 2.0
        label_smoothing: 0.05
        robust_loss_mode: truncation
        truncation_quantile: 0.8
        truncation_warmup_epochs: 1
        truncation_drop_weight: 0.1
        min_keep_ratio: 0.5
    optimizer_uss:
      module: torch.optim
      main: AdamW
      args: {params: null, lr: 0.00005, betas: [0.9, 0.999], eps: 0.00000001, weight_decay: 0.0, amsgrad: true}
    optimizer_sc:
      module: torch.optim
      main: AdamW
      args: {params: null, lr: 0.00002, betas: [0.9, 0.999], eps: 0.00000001, weight_decay: 0.01, amsgrad: true}
    is_validation: true

train:
  callbacks:
  - name: checkpoint
    module: lightning.pytorch.callbacks
    main: ModelCheckpoint
    args: {every_n_epochs: 1, filename: '{epoch}', save_top_k: 1, save_last: true, monitor: epoch_val/loss, mode: min, dirpath: null}
  - name: tqdm
    module: lightning.pytorch.callbacks
    main: TQDMProgressBar
    args: {refresh_rate: 60, process_position: 0}
  trainer:
    module: lightning.pytorch
    main: Trainer
    args:
      accelerator: gpu
      devices: 1
      strategy: auto
      precision: bf16-mixed
      max_epochs: 20
      log_every_n_steps: 50
      use_distributed_sampler: false
      sync_batchnorm: false
      num_sanity_val_steps: 0
      enable_checkpointing: true
      enable_progress_bar: true
      enable_model_summary: false
      gradient_clip_val: 0.0
