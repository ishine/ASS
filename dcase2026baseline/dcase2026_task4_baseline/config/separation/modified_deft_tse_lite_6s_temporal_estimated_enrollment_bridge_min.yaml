task_name: modified_deft_tse_lite_6s_temporal_estimated_enrollment_bridge
manual_seed: 0
deterministic: true

datamodule:
  module: src.datamodules.datamodule
  main: DataModule
  args:
    train_dataloader:
      batch_size: 2
      num_workers: 2
      persistent_workers: false
      dataset:
        module: src.datamodules.tse_bridge_dataset
        main: BridgeEstimatedEnrollmentTSEDataset
        args:
          label_source: oracle
          crop_seconds: 6.0
          random_crop: true
          require_estimate_for_active: true
          bridge_feature_dir: workspace/sc_finetune/uss_bridge_features
          bridge_feature_key: tse_condition
          bridge_feature_dim: 256
          require_bridge_feature: false
          base_dataset:
            args:
              config:
                mode: waveform
                soundscape_dir: workspace/sc_finetune/soundscape
                oracle_target_dir: workspace/sc_finetune/oracle_target
                estimate_target_dir: workspace/sc_finetune/estimate_target
                sr: 32000
              n_sources: 3
              label_set: dcase2026t4
              return_source: true
              label_vector_mode: stack
              silence_label_mode: zeros
              return_meta: false
    val_dataloader:
      batch_size: 2
      num_workers: 2
      persistent_workers: false
      dataset:
        module: src.datamodules.tse_bridge_dataset
        main: BridgeTSEDataset
        args:
          bridge_feature_dir: workspace/valid_uss_bridge_features
          bridge_feature_key: tse_condition
          bridge_feature_dim: 256
          require_bridge_feature: false
          base_dataset:
            args:
              config:
                mode: metadata
                metadata_list: data/dev_set/metadata/valid.json
                fg_return: {dry: true, dry_channel: 0, metadata: true}
                sr: 32000
              n_sources: 3
              label_set: dcase2026t4
              return_source: true
              label_vector_mode: stack
              silence_label_mode: zeros
              return_meta: false

lightning_module:
  module: src.training.lightningmodule.tse_bridge
  main: TSEBridgeLightning
  args:
    pretrained_model_ckpt: checkpoint/modified_deft_tse_lite_6s_temporal.ckpt
    pretrained_model_strict: false
    model:
      module: src.models.deft.modified_deft_tse_bridge
      main: BridgeModifiedDeFTTSEMemoryEfficientTemporal
      args:
        mixture_channels: 4
        enrollment_channels: 1
        hidden_channels: 96
        n_deft_blocks: 6
        n_heads: 4
        label_dim: 18
        window_size: 1024
        hop_size: 320
        time_window_size: 128
        freq_group_size: 64
        shift_windows: true
        sample_rate: 32000
        inference_chunk_seconds: 10.0
        inference_chunk_hop_seconds: 8.0
        bridge_condition_dim: 256
        bridge_hidden_dim: 256
        bridge_label_scale: 0.5
        bridge_dropout: 0.0
        require_bridge_condition: false
    loss:
      module: src.training.loss.masked_snr
      main: get_loss_func
      args:
        lambda_inactive: 0.05
        lambda_activity: 0.1
        activity_pos_weight: 2.0
    optimizer:
      module: torch.optim
      main: AdamW
      args: {params: null, lr: 0.00005, betas: [0.9, 0.999], eps: 0.00000001, weight_decay: 0.0, amsgrad: true}
    is_validation: true

train:
  callbacks:
  - name: checkpoint
    module: lightning.pytorch.callbacks
    main: ModelCheckpoint
    args: {every_n_epochs: 1, filename: '{epoch}', save_top_k: 1, save_last: true, monitor: epoch_val/loss, mode: min, dirpath: null}
  - name: tqdm
    module: lightning.pytorch.callbacks
    main: TQDMProgressBar
    args: {refresh_rate: 60, process_position: 0}
  trainer:
    module: lightning.pytorch
    main: Trainer
    args:
      accelerator: auto
      devices: auto
      strategy: ddp_find_unused_parameters_true
      precision: bf16-mixed
      max_epochs: 30
      log_every_n_steps: 100
      use_distributed_sampler: true
      sync_batchnorm: false
      num_sanity_val_steps: 0
      enable_checkpointing: true
      enable_progress_bar: true
      enable_model_summary: true
      gradient_clip_val: 0.5
