task_name: __
description: __

deterministic: true
manual_seed: 0

datamodule:
  module: src.datamodules.datamodule
  main: DataModule
  args:
    train_dataloader:
      batch_size: 4
      num_workers: 4
      persistent_workers: false
      dataset:
        module: src.datamodules.tse_dataset
        main: TSEDataset
        args:
          base_dataset:
            args:
              config:
                mode: generate
                spatial_sound_scene:
                  duration: 10.0
                  sr: 32000
                  max_event_overlap: 3
                  max_event_dur: 10.0
                  ref_db: -55
                  foreground_dir: data/dev_set/sound_event/train
                  background_dir: data/dev_set/noise/train
                  interference_dir: data/dev_set/interference/train
                  room_config:
                    module: src.modules.spatial_audio_synthesizer.room
                    main: SofaRoom
                    args:
                      path: data/dev_set/room_ir/train
                      direct_range_ms: [6, 50]
                dupse_rate: 0.5
                dupse_min_angle: 60.0
                max_n_dupse: 2
                dupse_exclusion_folder_depth: 1
                snr_range: [5, 20]
                nevent_range: [0, 3]
                ninterference_range: [0, 2]
                inteference_snr_range: [0, 15]
                dataset_length: 10112
                shuffle_label: true
                fg_return: {dry: true, dry_channel: 0, metadata: true}
              n_sources: 3
              label_set: dcase2026t4
              return_source: true
              label_vector_mode: stack
              silence_label_mode: zeros
              return_meta: false
    val_dataloader:
      batch_size: 4
      num_workers: 4
      persistent_workers: false
      dataset:
        module: src.datamodules.tse_dataset
        main: TSEDataset
        args:
          base_dataset:
            args:
              config:
                mode: metadata
                metadata_list: data/dev_set/metadata/valid.json
                fg_return:
                  dry: true
                  dry_channel: 0
                  metadata: true
                sr: 32000
              n_sources: 3
              label_set: dcase2026t4
              return_source: true
              label_vector_mode: stack
              silence_label_mode: zeros
              return_meta: false
lightning_module:
  module: src.training.lightningmodule.tse
  main: TSELightning
  args:
    model:
      module: src.models.deft.modified_deft
      main: ModifiedDeFTTSE
      args:
        mixture_channels: 4
        enrollment_channels: 1
        hidden_channels: 96
        n_deft_blocks: 6
        n_heads: 4
        label_dim: 18
    loss:
      module: src.training.loss.masked_snr
      main: get_loss_func
      args:
        lambda_inactive: 0.05
    optimizer:
      module: torch.optim
      main: AdamW
      args:
        params:
        lr: 0.0001
        betas: [0.9, 0.999]
        eps: 0.00000001
        weight_decay: 0.0
        amsgrad: true
    is_validation: true
train:
  callbacks:
  - name: checkpoint
    module: lightning.pytorch.callbacks
    main: ModelCheckpoint
    args:
      every_n_epochs: 1
      filename: '{epoch}'
      save_top_k: 1
      save_last: true
      monitor: epoch_val/loss
      mode: min
      verbose: false
      dirpath:
  - name: tqdm
    module: lightning.pytorch.callbacks
    main: TQDMProgressBar
    args:
      refresh_rate: 60
      process_position: 0
  trainer:
    module: lightning.pytorch
    main: Trainer
    args:
      accelerator: auto
      devices: auto
      strategy: ddp_find_unused_parameters_true
      num_nodes: 1
      precision: 32-true
      logger:
      fast_dev_run: false
      max_epochs: 100
      log_every_n_steps: 100
      use_distributed_sampler: true
      sync_batchnorm: true
      num_sanity_val_steps: 0
      enable_checkpointing: true
      enable_progress_bar: true
      enable_model_summary: true
      gradient_clip_val: 0.5
