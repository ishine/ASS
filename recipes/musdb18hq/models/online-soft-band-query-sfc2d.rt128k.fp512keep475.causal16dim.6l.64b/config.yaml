_base_: ${base_config_path}/train_base.yaml

seed: 2026

sr: 44100
n_fft: 2048
hop_length: 512

n_src: 4
n_chan: 2

online_d_model: 16
online_n_layers: 6
online_n_bands: 64
online_kernel_t: 3
online_kernel_f: 3
online_causal: true
online_masking: true
online_band_config: musical
online_routing_normalization: softmax
online_freq_preprocess_enabled: true
online_freq_preprocess_keep_bins: 475
online_freq_preprocess_target_bins: 512
online_freq_preprocess_mode: triangular

trainer:
  max_epochs: 900
  check_val_every_n_epoch: 5
  gradient_clip_val: 5.0
  sync_batchnorm: True
  deterministic: false

  limit_train_batches: 110

  benchmark: True
  use_distributed_sampler: False
  precision: bf16-mixed

  callbacks:
    - _target_: lightning.pytorch.callbacks.ModelCheckpoint
      filename: "{epoch:04d}"
      save_top_k: 5
      monitor: validation/loss
      mode: min
      save_last: True
    - _target_: lightning.pytorch.callbacks.RichProgressBar
      refresh_rate: 5
    - _target_: lightning.pytorch.callbacks.RichModelSummary
      max_depth: 3

datamodule:
  _target_: spectral_feature_compression.common.datamodules.hdf5_wav_datamodule.DataModule
  train_dataset_path:
    - ./recipes/musdb18hq/hdf5/train_bass_seg8sec_sad.hdf5
    - ./recipes/musdb18hq/hdf5/train_drums_seg8sec_sad.hdf5
    - ./recipes/musdb18hq/hdf5/train_vocals_seg8sec_sad.hdf5
    - ./recipes/musdb18hq/hdf5/train_other_seg8sec_sad.hdf5
  val_dataset_path: ./recipes/musdb18hq/hdf5/dev_unsegmented.hdf5
  batch_size: 4
  val_batch_size: 1
  sr: ${sr}
  duration: 6
  val_duration: null
  num_workers: 4
  return_ref: true
  use_scatter_dataset: false
  use_dm_dataset: true
  p_source_dropout: 0.1
  val_drop_last: false

task:
  _target_: spectral_feature_compression.core.tasks.sup_task.SupTask
  n_fft: ${n_fft}
  hop_length: ${hop_length}
  css_validation: true

  ema_weight: 0.999
  ema_update_freq: 1

  model:
    _target_: spectral_feature_compression.core.model.online_soft_band_query_sfc_2d.build_online_soft_band_query_sfc_system
    n_fft: ${n_fft}
    hop_length: ${hop_length}
    fs: ${sr}
    scaling: false

    css_segment_size: 12
    css_shift_size: 6

    n_src: ${n_src}
    n_chan: ${n_chan}
    n_bands: ${online_n_bands}
    band_config: ${online_band_config}
    d_model: ${online_d_model}
    n_layers: ${online_n_layers}
    kernel_size: [${online_kernel_t}, ${online_kernel_f}]
    causal: ${online_causal}
    masking: ${online_masking}
    routing_normalization: ${online_routing_normalization}
    freq_preprocess_enabled: ${online_freq_preprocess_enabled}
    freq_preprocess_keep_bins: ${online_freq_preprocess_keep_bins}
    freq_preprocess_target_bins: ${online_freq_preprocess_target_bins}
    freq_preprocess_mode: ${online_freq_preprocess_mode}

  loss:
    _target_: spectral_feature_compression.core.loss.snr.ThresSNRLossWithInactiveSource
    solve_perm: false
    n_src: ${n_src}
    zeroref_weight: 0.1
    only_denominator: false

  optimizer_config:
    _target_: aiaccel.torch.lightning.OptimizerConfig
    optimizer_generator:
      _partial_: True
      _target_: torch.optim.AdamW
      lr: 1.e-3
      weight_decay: 1.e-2
      betas:
        - 0.9
        - 0.999
    scheduler_generator:
      _partial_: True
      _target_: spectral_feature_compression.common.lr_schedulers.warmup.WarmUpStepLR
      warmup_steps: 5000
      decay_start_step: 60500
      decay_stop_step: 99000
      step_size: 220
      decay: 0.98
    scheduler_interval: step
